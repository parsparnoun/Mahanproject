<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>داشبورد مدیریتی</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    /* استایل‌های پایه برای ورود */
    #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; display: flex; justify-content: center; align-items: center; z-index: 9999; }
    .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; }
    .login-box h2 { margin-bottom: 20px; color: #1e293b; }
    .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
    .login-box button { width: 100%; padding: 12px; background: #245eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    #app-wrapper { display: none; }
  </style>
</head>
<body>

  <div id="login-overlay">
    <div class="login-box">
      <h2>ورود به سامانه</h2>
      <input type="text" id="username" placeholder="نام کاربری" />
      <input type="password" id="password" placeholder="رمز عبور" />
      <button onclick="checkLogin()">ورود به داشبورد</button>
    </div>
  </div>

  <div id="app-wrapper">
    <div id="app"></div>
  </div>

  <script src="assets/dashboard-data.js"></script>
  <script src="assets/app.js"></script>
  <script>
    function checkLogin() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      
      // در اینجا می‌توانید منطق واقعی‌تری قرار دهید
      if (user === "mahanproject" && pass === "parnoun135") {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('app-wrapper').style.display = 'block';
      } else {
        alert("نام کاربری یا رمز عبور اشتباه است");
      }
    }
  </script>
</body>
</html>
