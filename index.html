<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به سامانه</title>
    <link rel="stylesheet" href="assets/styles.css"> 
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            
            <!-- آرم شرکت -->
            <img src="assets/logo.jpg" alt="آرم شرکت" class="company-logo">

            <h2>ورود به سامانه</h2>

            <form>
                <div class="input-group">
                    <input type="text" placeholder="نام کاربری" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="رمز عبور" required>
                </div>
                <button type="submit" class="login-btn">ورود به داشبورد</button>
            </form>
            
        </div>
    </div>
</body>
</html>
